<svg width="300" height="105" viewBox="0 0 300 105" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- LawBOX Inverse Wordmark -->
  <!-- White (#FFFFFF) for dark backgrounds -->
  
  <!-- "Law" text -->
  <text x="0" y="75" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="-1.5">Law</text>
  
  <!-- "BOX" with enclosing square -->
  <g transform="translate(150, 0)">
    <!-- Elegant square border around BOX -->
    <rect x="3" y="12" width="88" height="88" fill="none" stroke="#FFFFFF" stroke-width="2" rx="2"/>
    
    <!-- "BOX" text centered in square -->
    <text x="47" y="75" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">BOX</text>
  </g>
</svg>
